<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Universo de Mamá</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
        }

        /* Sol Central Majestuoso */
        .sun {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #ffffff, #fff586, #ffa500, #ff4500);
            border-radius: 50%;
            box-shadow: 0 0 60px #ff4500, 0 0 120px rgba(255, 69, 0, 0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 10px black;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.3); }
        }
