<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para la mejor Mamá del Universo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505;
            overflow: hidden;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        /* El Sol / Centro */
        .sun {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ffcc00, #ff8800);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff8800;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 10;
        }

        /* Contenedor de la Galaxia */
        .galaxy {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
        }

        /* Estrellas de fondo */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Palabras flotantes (Planetas) */
        .word {
            position: absolute;
            white-space: nowrap;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: orbit linear infinite;
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(var(--distance)) rotate(0deg); }
            to { transform: rotate(360deg) translateX(var(--distance)) rotate(-360deg); }
        }

        /* Estrellas fugaces */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot 3s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0) rotate(-45deg); opacity: 1; }
            100% { transform: translateX(1000px) translateY(1000px) rotate(-45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="galaxy" id="galaxy">
        <div class="sun">TE AMO<br>MAMÁ ❤️</div>
    </div>

    <script>
        const words = [
            "Mi guía ✨", "Mi paz 🕊️", "Amor Eterno", "Gracias Mamita", 
            "Mi refugio", "Magia pura", "Eres única", "Felicidad", 
            "Mi ejemplo", "Te amo", "Reina mía", "Luz de mi vida",
            "Amanecer", "Mi universo", "Inspiración", "Valiente",
            "Ternura", "Mi paraíso", "Siempre juntos", "Bendición"
        ];

        const galaxy = document.getElementById('galaxy');

        // Crear estrellas de fondo
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            galaxy.appendChild(star);
        }

        // Crear palabras orbitando
        words.forEach((w, index) => {
            const wordDiv = document.createElement('div');
            wordDiv.className = 'word';
            wordDiv.innerText = w;
            
            // Distancia aleatoria del centro y velocidad
            const dist = 150 + (index * 15); 
            const duration = 10 + (Math.random() * 20);
            
            wordDiv.style.setProperty('--distance', `${dist}px`);
            wordDiv.style.animationDuration = `${duration}s`;
            wordDiv.style.left = '50%';
            wordDiv.style.top = '50%';
            
            // Color aleatorio suave
            const colors = ['#ff9a9e', '#fad0c4', '#a1c4fd', '#c2e9fb', '#fbc2eb'];
            wordDiv.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            galaxy.appendChild(wordDiv);
        });

        // Crear estrellas fugaces cada cierto tiempo
        setInterval(() => {
            const ss = document.createElement('div');
            ss.className = 'shooting-star';
            ss.style.left = `${Math.random() * 100}%`;
            ss.style.top = `${Math.random() * 20}%`;
            galaxy.appendChild(ss);
            setTimeout(() => ss.remove(), 3000);
        }, 2000);
    </script>
</body>
</html>
